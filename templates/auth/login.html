<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a3a1f">
    <title>Login — AgroGest</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a3a1f 0%, #2d6a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 60px; height: 60px;
            background: #1a3a1f;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 12px;
        }
        .brand-name {
            font-weight: 800;
            font-size: 24px;
            color: #1a3a1f;
        }
        .brand-sub {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        .form-label { font-size: 13px; font-weight: 600; color: #374151; }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #d1d5db;
            padding: 10px 14px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #2d6a35;
            box-shadow: 0 0 0 3px rgba(45,106,53,.12);
        }
        .btn-login {
            background: #1a3a1f;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
            width: 100%;
            transition: background .15s;
        }
        .btn-login:hover { background: #2d6a35; color: #fff; }
        .alert { border-radius: 10px; border: none; font-size: 13px; }
        .alert-danger  { background: #fee2e2; color: #991b1b; }
        .alert-warning { background: #fef9c3; color: #92400e; }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-info    { background: #dbeafe; color: #1e40af; }
        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-name">AgroGest</div>
        <div class="brand-sub">Gestão Agrícola</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:10px 0 0 10px;border-color:#d1d5db;">
                    <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" name="email" class="form-control"
                       style="border-radius:0 10px 10px 0"
                       placeholder="seu@email.com" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text" style="border-radius:10px 0 0 10px;border-color:#d1d5db;">
                    <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" name="senha" id="senhaInput" class="form-control"
                       style="border-radius:0 10px 10px 0"
                       placeholder="••••••••" required>
                <button type="button" class="btn btn-outline-secondary"
                        style="border-radius:0 10px 10px 0;border-color:#d1d5db;"
                        onclick="toggleSenha()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
    </form>

    <div class="footer-text">
        Projeto Faculdade — AgroGest &copy; 2025<br>
        Criado por Lucas
    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById('senhaInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
