{% extends "base.html" %}
{% block title %}{{ 'Editar' if plantio else 'Novo' }} Plantio{% endblock %}
{% block content %}
<div class="page-header">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('plantio.index') }}">Plantios</a></li>
            <li class="breadcrumb-item active">{{ 'Editar' if plantio else 'Novo Plantio' }}</li>
        </ol>
    </nav>
    <h1 class="page-title">{{ 'Editar Plantio' if plantio else 'Novo Plantio' }}</h1>
</div>
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Talhão *</label>
                            <select name="talhao_id" class="form-select" required>
                                <option value="">Selecione...</option>
                                {% for t in talhoes %}
                                <option value="{{ t.id }}" {% if plantio and plantio.talhao_id==t.id %}selected{% endif %}>
                                    {{ t.nome }} ({{ t.area_ha }} ha)
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Safra *</label>
                            <input type="text" name="safra" class="form-control"
                                   value="{{ plantio.safra if plantio else '' }}" required placeholder="2024/25">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data do Plantio</label>
                            <input type="date" name="data_plantio" class="form-control"
                                   value="{{ plantio.data_plantio if plantio else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Área Plantada (ha)</label>
                            <input type="number" name="area_plantada" class="form-control"
                                   value="{{ plantio.area_plantada if plantio else '' }}" step="0.01">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Híbrido / Variedade</label>
                            <input type="text" name="hibrido" class="form-control"
                                   value="{{ plantio.hibrido if plantio else '' }}" placeholder="Ex: DKB 390, P3862">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pop. (pl/ha)</label>
                            <input type="number" name="populacao" class="form-control"
                                   value="{{ plantio.populacao if plantio else '' }}" placeholder="65000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                {% for s in ['planejado','plantado','emergencia','vegetativo','reprodutivo','maturacao','colhido'] %}
                                <option {% if plantio and plantio.status==s %}selected{% endif %}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observações</label>
                            <textarea name="observacoes" class="form-control" rows="2">{{ plantio.observacoes if plantio else '' }}</textarea>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-2"></i>Salvar
                        </button>
                        <a href="{{ url_for('plantio.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
